<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:420px;
    background:#fff;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    padding:30px;
    text-align:center;
}

.card img{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #4facfe;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.card h1{
    margin-top:20px;
    color:#333;
}

.card p{
    color:#666;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table tr{
    border-bottom:1px solid #ddd;
}

table td{
    padding:12px;
    text-align:left;
}

table td:first-child{
    font-weight:bold;
    color:#4facfe;
    width:40%;
}

.social{
    margin-top:25px;
}

.social a{
    text-decoration:none;
    background:#4facfe;
    color:white;
    padding:10px 18px;
    border-radius:30px;
    transition:.3s;
}

.social a:hover{
    background:#0077ff;
}
</style>
